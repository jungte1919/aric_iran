  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Sans KR", sans-serif; background: #f8fafc; color: #1e293b; }

    .nav a.why { background: #fef3c7; border-color: #f59e0b; color: #d97706; }
    #map { width: 100%; height: calc(100vh - 52px); }
    .legend { position: absolute; bottom: 24px; right: 24px; z-index: 1000; background: #fff; padding: 14px 18px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 12px; line-height: 1.6; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 320px; }

    .legend-row.us { background: #fff5f5; border-left: 4px solid #ff6b6b; }
    .legend-row.iran-israel { background: #fff0f0; border-left: 4px solid #ff5c5c; }
    .legend-row.mideast { background: #e5f7f5; border-left: 4px solid #4ecdc4; }
    .legend-footer { font-size: 11px; color: #64748b; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #e2e8f0; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 12px; min-width: 200px; }
    .leaflet-popup-content h4 { margin: 0 0 8px; padding-bottom: 6px; border-bottom: 2px solid #1d4ed8; }
    .leaflet-popup-content table { width: 100%; border-collapse: collapse; }
    .leaflet-popup-content td { padding: 4px 6px; vertical-align: top; }

      #map { height: calc(100vh - 58px); }
