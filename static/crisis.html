<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>위기 분석 - 데이터로 바라본 외교</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/shared.css">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e5e7eb; }
    header { padding: 16px 24px; background: linear-gradient(to right, #111827, #1e293b); border-bottom: 1px solid #1f2933; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; margin: 0; }
    .nav a { color: #93c5fd; text-decoration: none; margin-left: 12px; font-size: 14px; }
    .nav a:hover { text-decoration: underline; }
    .container { max-width: 1120px; margin: 0 auto; padding: 16px; }
    .card { background: #020617; border-radius: 12px; border: 1px solid #1f2933; padding: 16px 18px 18px; margin-bottom: 16px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.7); }
    .card h2 { font-size: 16px; margin: 0 0 8px; color: #f9fafb; }
    .subtext { font-size: 12px; color: #9ca3af; margin-bottom: 12px; }
    .chart-wrap { min-height: 280px; position: relative; border-radius: 10px; background: rgba(15, 23, 42, 0.5); padding: 12px; margin-bottom: 12px; }
    .chart-wrap canvas { max-width: 100%; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 8px; }
    select { padding: 6px 8px; border-radius: 8px; border: 1px solid #374151; background: #020617; color: #e5e7eb; font-size: 13px; }
    button.primary { padding: 8px 14px; border-radius: 999px; border: none; background: linear-gradient(to right, #2563eb, #4f46e5); color: white; font-size: 13px; cursor: pointer; }
    button.primary:disabled { opacity: 0.5; cursor: default; }
    .status { font-size: 12px; color: #9ca3af; margin-left: 8px; }
    .status.error { color: #f97373; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>위기 분석 · 원자재·금융·외환·주식</h1>
      <div class="subtext">원자재 가격, 금융 공포지수(VIX), 외환 변동, 주식시장 지수를 한 화면에서 확인합니다.</div>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기/닫기">☰</button>
    <nav class="nav">
      <a href="/">← 대시보드</a>
      <a href="/hormuz">⚓ 호르무즈</a>
    </nav>
  </header>
  <main class="container">
    <div class="row" style="margin-bottom: 16px;">
      <label style="color: #94a3b8;">기간:</label>
      <select id="period">
        <option value="3mo">최근 3개월</option>
        <option value="6mo">최근 6개월</option>
        <option value="1y" selected>최근 1년</option>
      </select>
      <button id="btnLoad" class="primary">전체 새로고침</button>
      <span id="globalStatus" class="status"></span>
    </div>

    <section class="card">
      <h2>1. 원자재 가격</h2>
      <div class="subtext">WTI, Brent, 천연가스, 금, 은, 구리 (선물 종가 기준)</div>
      <div class="chart-wrap"><div id="placeCommodities" style="min-height: 280px; display: flex; align-items: center; justify-content: center; color: #6b7280;">기간 선택 후 새로고침을 누르세요.</div></div>
    </section>
    <section class="card">
      <h2>2. 금융 공포지수</h2>
      <div class="subtext">VIX(미국), MOVE(채권 변동성)</div>
      <div class="chart-wrap"><div id="placeFear" style="min-height: 280px; display: flex; align-items: center; justify-content: center; color: #6b7280;">—</div></div>
    </section>
    <section class="card">
      <h2>3. 외환 변동</h2>
      <div class="subtext">USD/KRW, EUR/USD, USD/JPY</div>
      <div class="chart-wrap"><div id="placeFx" style="min-height: 280px; display: flex; align-items: center; justify-content: center; color: #6b7280;">—</div></div>
    </section>
    <section class="card">
      <h2>4. 주식시장</h2>
      <div class="subtext">S&P500, KOSPI, 니케이225, FTSE100</div>
      <div class="chart-wrap"><div id="placeStocks" style="min-height: 280px; display: flex; align-items: center; justify-content: center; color: #6b7280;">—</div></div>
    </section>
  </main>
  <script>
    var chartCommodities = null, chartFear = null, chartFx = null, chartStocks = null;
    var colors = ['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#06b6d4'];

    function setGlobalStatus(msg, isErr) {
      var el = document.getElementById('globalStatus');
      el.textContent = msg || '';
      el.className = 'status' + (isErr ? ' error' : '');
    }

    function buildDatasets(series) {
      var names = Object.keys(series);
      return names.map(function(name, i) {
        var vals = series[name];
        return {
          label: name,
          data: vals,
          borderColor: colors[i % colors.length],
          backgroundColor: colors[i % colors.length] + '33',
          tension: 0.25,
          spanGaps: true
        };
      });
    }

    function drawChart(placeholderId, chartRef, title, labels, series) {
      var place = document.getElementById(placeholderId);
      if (series && Object.keys(series).length > 0) {
        place.innerHTML = '<canvas id="' + placeholderId + 'Canvas"></canvas>';
        var ctx = document.getElementById(placeholderId + 'Canvas').getContext('2d');
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(ctx, {
          type: 'line',
          data: { labels: labels, datasets: buildDatasets(series) },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 1.4,
            plugins: {
              legend: { position: 'top' },
              title: { display: true, text: title },
              tooltip: { mode: 'index', intersect: false }
            },
            scales: {
              x: { title: { display: true, text: '날짜' } },
              y: { title: { display: true, text: '값' } }
            }
          }
        });
      } else {
        place.innerHTML = '<span style="color:#9ca3af;">데이터가 없거나 오류가 발생했습니다.</span>';
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
      }
    }

    function fetchAndDraw(endpoint, placeholderId, chartRef, title) {
      var period = document.getElementById('period').value;
      return fetch('/api/crisis/' + endpoint + '?period=' + period)
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res.error) {
            document.getElementById(placeholderId).innerHTML = '<span style="color:#f97373;">' + res.error + '</span>';
            if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
            return;
          }
          drawChart(placeholderId, chartRef, title, res.labels || [], res.series || {});
        })
        .catch(function(e) {
          document.getElementById(placeholderId).innerHTML = '<span style="color:#f97373;">요청 실패: ' + e.message + '</span>';
          if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        });
    }

    function loadAll() {
      setGlobalStatus('불러오는 중...');
      var period = document.getElementById('period').value;
      Promise.all([
        fetchAndDraw('commodities', 'placeCommodities', { current: chartCommodities }, '원자재 가격'),
        fetchAndDraw('fear', 'placeFear', { current: chartFear }, '금융 공포지수 (VIX, MOVE)'),
        fetchAndDraw('fx', 'placeFx', { current: chartFx }, '외환 변동'),
        fetchAndDraw('stocks', 'placeStocks', { current: chartStocks }, '주식시장 지수')
      ]).then(function() {
        setGlobalStatus('완료');
      }).catch(function() {
        setGlobalStatus('일부 요청 실패', true);
      });
    }

    document.getElementById('btnLoad').addEventListener('click', function() {
      loadAll();
    });

    document.getElementById('period').addEventListener('change', function() {
      loadAll();
    });

    loadAll();
  </script>
  <script>
    (function(){
      var btn = document.getElementById('navToggle');
      var nav = document.querySelector('header nav.nav');
      if (!btn || !nav) return;
      btn.addEventListener('click', function(){
        var open = nav.classList.toggle('mobile-open');
        btn.textContent = open ? '✕' : '☰';
      });
      nav.addEventListener('click', function(e){
        if (e.target.tagName === 'A') {
          nav.classList.remove('mobile-open');
          btn.textContent = '☰';
        }
      });
    })();
  </script>
</body>
</html>
